name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package Windows And Android
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: apps/opencb_app
        run: flutter pub get

      - name: Prepare Android signing
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_BASE64) `
            -or [string]::IsNullOrWhiteSpace($env:ANDROID_KEYSTORE_PASSWORD) `
            -or [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_ALIAS) `
            -or [string]::IsNullOrWhiteSpace($env:ANDROID_KEY_PASSWORD)) {
            throw "Missing Android signing secrets. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
          }

          [IO.File]::WriteAllBytes(
            "apps/opencb_app/android/upload-keystore.jks",
            [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64)
          )

          @"
          storeFile=upload-keystore.jks
          storePassword=$env:ANDROID_KEYSTORE_PASSWORD
          keyAlias=$env:ANDROID_KEY_ALIAS
          keyPassword=$env:ANDROID_KEY_PASSWORD
          "@ | Set-Content "apps/opencb_app/android/key.properties" -Encoding utf8

      - name: Build Windows release
        working-directory: apps/opencb_app
        run: flutter build windows --release

      - name: Build Android release APK
        working-directory: apps/opencb_app
        run: flutter build apk --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $windowsSource = "apps/opencb_app/build/windows/x64/runner/Release"
          $windowsZip = "OpenCB-Windows-x64-$tag.zip"
          $androidApk = "OpenCB-Android-release-$tag.apk"
          $installer = "dist/OpenCB-Setup-$version.exe"

          Compress-Archive -Path "$windowsSource/*" -DestinationPath $windowsZip -Force
          Copy-Item "apps/opencb_app/build/app/outputs/flutter-apk/app-release.apk" $androidApk -Force

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DRepoRoot=$((Get-Location).Path)" `
            "installer/windows/OpenCB.iss"

          if (!(Test-Path $installer)) {
            throw "Installer was not created: $installer"
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenCB-${{ github.ref_name }}
          path: |
            dist/OpenCB-Setup-*.exe
            OpenCB-Windows-x64-${{ github.ref_name }}.zip
            OpenCB-Android-release-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'internal') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            dist/OpenCB-Setup-*.exe
            OpenCB-Windows-x64-${{ github.ref_name }}.zip
            OpenCB-Android-release-${{ github.ref_name }}.apk
