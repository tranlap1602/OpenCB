name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: apps/opencb_app
        run: flutter pub get

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ] \
            || [ -z "${ANDROID_KEYSTORE_PASSWORD:-}" ] \
            || [ -z "${ANDROID_KEY_ALIAS:-}" ] \
            || [ -z "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "Missing Android signing secrets."
            exit 1
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > apps/opencb_app/android/upload-keystore.jks
          cat > apps/opencb_app/android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build Android release APK
        working-directory: apps/opencb_app
        run: flutter build apk --release

      - name: Package Android APK
        run: |
          tag="${{ github.ref_name }}"
          cp apps/opencb_app/build/app/outputs/flutter-apk/app-release.apk "OpenCB-Android-release-${tag}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCB-Android-${{ github.ref_name }}
          path: OpenCB-Android-release-${{ github.ref_name }}.apk

  windows:
    name: Windows Installer And Portable
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: apps/opencb_app
        run: flutter pub get

      - name: Build Rust core release DLL
        run: cargo build --release --package opencb_core

      - name: Build Windows release
        working-directory: apps/opencb_app
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package Windows files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $windowsSource = "apps/opencb_app/build/windows/x64/runner/Release"
          $windowsZip = "OpenCB-Windows-x64-$tag.zip"
          $installer = "dist/OpenCB-Setup-$version.exe"

          Compress-Archive -Path "$windowsSource/*" -DestinationPath $windowsZip -Force

          New-Item -ItemType Directory -Force -Path "dist" | Out-Null
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DRepoRoot=$((Get-Location).Path)" `
            "installer/windows/OpenCB.iss"

          if (!(Test-Path $installer)) {
            throw "Installer was not created: $installer"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenCB-Windows-${{ github.ref_name }}
          path: |
            dist/OpenCB-Setup-*.exe
            OpenCB-Windows-x64-${{ github.ref_name }}.zip

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [android, windows]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'internal') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: release-assets/*
