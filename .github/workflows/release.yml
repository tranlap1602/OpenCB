name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    name: Package Windows And Android
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        working-directory: apps/opencb_app
        run: flutter pub get

      - name: Build Windows release
        working-directory: apps/opencb_app
        run: flutter build windows --release

      - name: Build Android debug APK
        working-directory: apps/opencb_app
        run: flutter build apk --debug

      - name: Package files
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $windowsSource = "apps/opencb_app/build/windows/x64/runner/Release"
          $windowsZip = "OpenCB-Windows-x64-$tag.zip"
          $androidApk = "OpenCB-Android-debug-$tag.apk"

          Compress-Archive -Path "$windowsSource/*" -DestinationPath $windowsZip -Force
          Copy-Item "apps/opencb_app/build/app/outputs/flutter-apk/app-debug.apk" $androidApk -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenCB-${{ github.ref_name }}
          path: |
            OpenCB-Windows-x64-${{ github.ref_name }}.zip
            OpenCB-Android-debug-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            OpenCB-Windows-x64-${{ github.ref_name }}.zip
            OpenCB-Android-debug-${{ github.ref_name }}.apk
