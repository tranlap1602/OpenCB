name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust Core
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test Rust core
        run: cargo test

  flutter:
    name: Flutter App
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Flutter pub get
        working-directory: apps/opencb_app
        run: flutter pub get

      - name: Analyze
        working-directory: apps/opencb_app
        run: flutter analyze

      - name: Test
        working-directory: apps/opencb_app
        run: flutter test

      - name: Build Rust core release DLL
        run: cargo build --release --package opencb_core

      - name: Build Windows debug
        working-directory: apps/opencb_app
        run: flutter build windows --debug
