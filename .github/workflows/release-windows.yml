name: Release Windows

on:
  push:
    tags:
      - "v*"

jobs:
  windows-portable:
    name: Windows Portable Artifact
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Windows release
        working-directory: apps/opencb_app
        run: flutter build windows --release

      - name: Package portable zip
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $source = "apps/opencb_app/build/windows/x64/runner/Release"
          $zip = "OpenCB-Windows-x64-$tag.zip"
          Compress-Archive -Path "$source/*" -DestinationPath $zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCB-Windows-x64-${{ github.ref_name }}
          path: OpenCB-Windows-x64-${{ github.ref_name }}.zip
